services:
  web:
    container_name: ${COMPOSE_PROJECT_NAME:-trend-panel}
    image: ${DOCKER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-production}
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - traefik_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trend-panel.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.trend-panel.entrypoints=websecure"
      - "traefik.http.routers.trend-panel.middlewares=public-chain@file"
      - "traefik.http.services.trend-panel.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_network"

networks:
  traefik_network:
    external: true
