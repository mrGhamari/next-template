# ===========================================
# Frontend Pipeline - Next.js
# ===========================================

stages:
  - review
  - build
  - deploy

variables:
  DOCKER_BUILDKIT: "1"
  FULL_IMAGE: ${DOCKER_REGISTRY}/${IMAGE_NAME}
  NODE_VERSION: "22-alpine"

# ===========================================
# Review Stage - AI Code Review (MRs only)
# ===========================================
code-review:
  stage: review
  image: alpine:3.21
  variables:
    OPENROUTER_MODEL: "deepseek/deepseek-r1"
    GIT_DEPTH: 200
    MAX_DIFF_CHARS: "120000"
    MAX_OUTPUT_TOKENS: "4000"
  before_script:
    - apk add --no-cache curl jq git
  script:
    - |
      echo "========== AI Code Review =========="

      # Get base SHA
      if [ -n "$CI_MERGE_REQUEST_DIFF_BASE_SHA" ]; then
        BASE_SHA="$CI_MERGE_REQUEST_DIFF_BASE_SHA"
        echo "Using MR diff base: $BASE_SHA"
      else
        git fetch origin ${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-develop} --depth=200
        BASE_SHA="origin/${CI_MERGE_REQUEST_TARGET_BRANCH_NAME:-develop}"
        echo "Using target branch: $BASE_SHA"
      fi

      # Get all changed TypeScript/JavaScript files
      CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$BASE_SHA" HEAD -- '*.ts' '*.tsx' '*.js' '*.jsx' 2>/dev/null)
      FILE_COUNT=$(echo "$CHANGED_FILES" | grep -c . || echo 0)

      if [ "$FILE_COUNT" = "0" ]; then
        echo "No TypeScript/JavaScript files changed. Skipping review."
        exit 0
      fi

      echo "Changed TS/JS files: $FILE_COUNT"
      echo "$CHANGED_FILES" | head -20
      [ "$FILE_COUNT" -gt 20 ] && echo "... and $((FILE_COUNT - 20)) more files"
      echo ""

      # Get full diff
      FULL_DIFF=$(git diff "$BASE_SHA" HEAD -- $CHANGED_FILES 2>/dev/null)
      DIFF_CHARS=$(echo "$FULL_DIFF" | wc -c)
      DIFF_LINES=$(echo "$FULL_DIFF" | wc -l)

      echo "Diff size: $DIFF_LINES lines, $DIFF_CHARS characters"

      # Truncate if too large
      if [ "$DIFF_CHARS" -gt "$MAX_DIFF_CHARS" ]; then
        echo "Large diff detected! Truncating to ${MAX_DIFF_CHARS} chars"
        DIFF_CONTENT=$(echo "$FULL_DIFF" | head -c ${MAX_DIFF_CHARS})
        TRUNCATED="(Note: Diff truncated from ${DIFF_CHARS} to ${MAX_DIFF_CHARS} chars)"
      else
        DIFF_CONTENT="$FULL_DIFF"
        TRUNCATED=""
      fi

      if [ -z "$DIFF_CONTENT" ]; then
        echo "No diff content. Skipping review."
        exit 0
      fi

      echo "Sending to DeepSeek R1 for review..."

      # Build prompt
      if [ "$FILE_COUNT" -gt 50 ]; then
        REVIEW_MODE="LARGE MR with ${FILE_COUNT} files. Focus on critical security issues, major bugs, architectural concerns only."
      else
        REVIEW_MODE="Review for: 1) Security Issues 2) Bugs 3) Performance 4) React/Next.js Best Practices. Be concise."
      fi

      # Create prompt JSON safely
      PROMPT_TEXT="You are a senior Next.js/React/TypeScript code reviewer. ${TRUNCATED} ${REVIEW_MODE}"
      REQUEST_JSON=$(jq -n \
        --arg model "$OPENROUTER_MODEL" \
        --arg prompt "$PROMPT_TEXT" \
        --arg diff "$DIFF_CONTENT" \
        --argjson max_tokens "$MAX_OUTPUT_TOKENS" \
        '{
          model: $model,
          messages: [{role: "user", content: ($prompt + "\n\nGit Diff:\n```diff\n" + $diff + "\n```")}],
          max_tokens: $max_tokens
        }')

      RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
        -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
        -H "Content-Type: application/json" \
        -H "HTTP-Referer: ${CI_PROJECT_URL}" \
        -H "X-Title: GitLab Code Review" \
        -d "$REQUEST_JSON")

      ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
      if [ -n "$ERROR" ]; then
        echo "API Error: $ERROR"
        exit 1
      fi

      REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "No response received"')

      echo ""
      echo "============================================"
      echo "           AI CODE REVIEW REPORT           "
      echo "============================================"
      echo ""
      echo "$REVIEW"
      echo ""
      echo "============================================"

      # Post to MR
      if [ -n "$CI_MERGE_REQUEST_IID" ] && [ -n "$GITLAB_TOKEN" ]; then
        echo ""
        echo "========== Posting to GitLab MR =========="
        echo "MR IID: ${CI_MERGE_REQUEST_IID}"
        AUTH_HEADER="PRIVATE-TOKEN: ${GITLAB_TOKEN}"

        # 1. Post general comment
        echo "[1/4] Posting review comment..."
        COMMENT_BODY=$(printf '## AI Code Review (DeepSeek R1)\n\n%s' "$REVIEW")
        COMMENT_JSON=$(echo "$COMMENT_BODY" | jq -Rs '{body: .}')
        curl -s -w "\n%{http_code}" -X POST "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" -H "${AUTH_HEADER}" -H "Content-Type: application/json" -d "$COMMENT_JSON" | tail -n1 | grep -q 201 && echo "Comment posted" || echo "Comment failed"

        # 2. Get MR changes for inline comments
        echo "[2/4] Getting MR changes..."
        CHANGES_RESP=$(curl -s "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/changes" -H "${AUTH_HEADER}")
        MR_BASE_SHA=$(echo "$CHANGES_RESP" | jq -r '.diff_refs.base_sha // empty')
        MR_HEAD_SHA=$(echo "$CHANGES_RESP" | jq -r '.diff_refs.head_sha // empty')
        MR_START_SHA=$(echo "$CHANGES_RESP" | jq -r '.diff_refs.start_sha // empty')

        if [ -n "$MR_BASE_SHA" ]; then
          # 3. Request inline comments from AI
          echo "[3/4] Requesting inline comments..."
          INLINE_PROMPT=$(printf 'Return ONLY a JSON array with file issues: [{"file":"path.ts","line":10,"comment":"issue","severity":"critical"}] or empty array []. Based on: %s' "$REVIEW")
          INLINE_REQ=$(jq -n --arg model "$OPENROUTER_MODEL" --arg prompt "$INLINE_PROMPT" '{model:$model,messages:[{role:"user",content:$prompt}],max_tokens:2000}') || true
          INLINE_RESP=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" -H "Authorization: Bearer ${OPENROUTER_API_KEY}" -H "Content-Type: application/json" -d "$INLINE_REQ") || true
          INLINE_CONTENT=$(echo "$INLINE_RESP" | jq -r '.choices[0].message.content // ""' 2>/dev/null) || true
          INLINE_JSON=$(echo "$INLINE_CONTENT" | grep -o '\[.*\]' 2>/dev/null | head -1) || true

          if [ -n "$INLINE_JSON" ] && [ "$INLINE_JSON" != "[]" ] && echo "$INLINE_JSON" | jq empty 2>/dev/null; then
            INLINE_COUNT=$(echo "$INLINE_JSON" | jq 'length' 2>/dev/null) || INLINE_COUNT=0
            echo "Found $INLINE_COUNT inline comments"
            echo "$INLINE_JSON" | jq -c '.[]' 2>/dev/null | while read -r item || true; do
              FPATH=$(echo "$item" | jq -r '.file // ""' 2>/dev/null) || continue
              LNUM=$(echo "$item" | jq -r '.line // 1' 2>/dev/null) || continue
              CTXT=$(echo "$item" | jq -r '.comment // ""' 2>/dev/null) || continue
              SEV=$(echo "$item" | jq -r '.severity // "info"' 2>/dev/null) || SEV="info"
              [ -z "$FPATH" ] || [ -z "$CTXT" ] && continue
              case "$SEV" in critical) ICN="Critical";; warning) ICN="Warning";; *) ICN="Info";; esac
              DISC_JSON=$(jq -n --arg body "**$ICN**: $CTXT" --arg base "$MR_BASE_SHA" --arg head "$MR_HEAD_SHA" --arg start "$MR_START_SHA" --arg path "$FPATH" --arg line "$LNUM" '{body:$body,position:{base_sha:$base,head_sha:$head,start_sha:$start,position_type:"text",new_path:$path,new_line:($line|tonumber)}}') || continue
              curl -s -X POST "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/discussions" -H "${AUTH_HEADER}" -H "Content-Type: application/json" -d "$DISC_JSON" >/dev/null 2>&1 && echo "  + $FPATH:$LNUM" || echo "  - Skip: $FPATH:$LNUM"
            done || true
          else
            echo "No inline comments needed"
          fi
        else
          echo "Could not get MR changes"
        fi

        # 4. Update MR description with TODO items
        echo "[4/4] Updating MR description..."
        MR_RESP=$(curl -s "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" -H "${AUTH_HEADER}")
        CURRENT_DESC=$(echo "$MR_RESP" | jq -r '.description // ""')
        CLEAN_DESC=$(echo "$CURRENT_DESC" | sed '/<!-- AI_REVIEW_START -->/,/<!-- AI_REVIEW_END -->/d')
        SUMMARY=$(echo "$REVIEW" | head -c 500)
        TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')

        # Extract TODO items from review
        TODO_ITEMS=""
        if echo "$REVIEW" | grep -qiE "security|critical|fix|unsafe|xss|injection"; then
          TODO_ITEMS="$TODO_ITEMS\n- [ ] Fix security/critical issues mentioned above"
        fi
        if echo "$REVIEW" | grep -qiE "bug|error|broken"; then
          TODO_ITEMS="$TODO_ITEMS\n- [ ] Fix bugs mentioned in review"
        fi
        if echo "$REVIEW" | grep -qiE "recommend|suggest|should|consider"; then
          TODO_ITEMS="$TODO_ITEMS\n- [ ] Review recommendations and apply if needed"
        fi
        if echo "$REVIEW" | grep -qiE "test|testing"; then
          TODO_ITEMS="$TODO_ITEMS\n- [ ] Add/update tests"
        fi
        [ -z "$TODO_ITEMS" ] && TODO_ITEMS="\n- [x] No action items found"

        UPDATE_JSON=$(jq -n --arg clean "$CLEAN_DESC" --arg summary "$SUMMARY" --arg review "$REVIEW" --arg ts "$TIMESTAMP" --arg todos "$TODO_ITEMS" '{description:($clean+"\n\n<!-- AI_REVIEW_START -->\n---\n## AI Code Review\n\n### TODO\n"+$todos+"\n\n### Summary\n"+$summary+"...\n\n<details>\n<summary>View Full Review</summary>\n\n"+$review+"\n\n</details>\n\n_Updated: "+$ts+" by DeepSeek R1_\n<!-- AI_REVIEW_END -->")}')
        curl -s -X PUT "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}" -H "${AUTH_HEADER}" -H "Content-Type: application/json" -d "$UPDATE_JSON" | jq -r '.web_url // empty' | grep -q . && echo "MR description updated" || echo "Failed to update MR"

        echo "========== GitLab Integration Complete =========="
      else
        echo "Skipping - missing CI_MERGE_REQUEST_IID or GITLAB_TOKEN"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  allow_failure: true

# ===========================================
# Build Image (Staging - Auto on develop)
# ===========================================
build:staging:
  stage: build
  image: docker:27
  before_script:
    - |
      echo "Validating required variables..."
      for var in DOCKER_REGISTRY DOCKER_REGISTRY_USER DOCKER_REGISTRY_PASSWORD IMAGE_NAME; do
        eval "val=\$$var"
        [ -z "$val" ] && echo "ERROR: $var is not set" && exit 1
      done
    - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USER" --password-stdin "$DOCKER_REGISTRY"
    - echo "Pulling cache image..."
    - timeout 60 docker pull $FULL_IMAGE:cache || echo "No cache image found, building from scratch"
  script:
    - |
      CACHE_FLAG="--cache-from $FULL_IMAGE:cache"
      [ "$NO_CACHE" = "true" ] && CACHE_FLAG="--no-cache"
      docker build \
        $CACHE_FLAG \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL} \
        --build-arg NEXT_PUBLIC_APP_ENV=staging \
        -t $FULL_IMAGE:$CI_COMMIT_SHA \
        -t $FULL_IMAGE:$CI_COMMIT_SHORT_SHA \
        -t $FULL_IMAGE:staging \
        -t $FULL_IMAGE:cache \
        -f .docker/Dockerfile .
    - docker push $FULL_IMAGE:$CI_COMMIT_SHA
    - docker push $FULL_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $FULL_IMAGE:staging
    - docker push $FULL_IMAGE:cache
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"

# ===========================================
# Build Image (Feature Branches - Manual)
# ===========================================
build:feature:
  stage: build
  image: docker:27
  before_script:
    - |
      echo "Validating required variables..."
      for var in DOCKER_REGISTRY DOCKER_REGISTRY_USER DOCKER_REGISTRY_PASSWORD IMAGE_NAME; do
        eval "val=\$$var"
        [ -z "$val" ] && echo "ERROR: $var is not set" && exit 1
      done
    - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USER" --password-stdin "$DOCKER_REGISTRY"
    - echo "Pulling cache image..."
    - timeout 60 docker pull $FULL_IMAGE:cache || echo "No cache image found, building from scratch"
  script:
    - |
      CACHE_FLAG="--cache-from $FULL_IMAGE:cache"
      [ "$NO_CACHE" = "true" ] && CACHE_FLAG="--no-cache"
      docker build \
        $CACHE_FLAG \
        --build-arg NODE_VERSION=${NODE_VERSION} \
        --build-arg NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL} \
        --build-arg NEXT_PUBLIC_APP_ENV=development \
        -t $FULL_IMAGE:$CI_COMMIT_SHA \
        -t $FULL_IMAGE:$CI_COMMIT_SHORT_SHA \
        -t $FULL_IMAGE:$CI_COMMIT_REF_SLUG \
        -f .docker/Dockerfile .
    - docker push $FULL_IMAGE:$CI_COMMIT_SHA
    - docker push $FULL_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $FULL_IMAGE:$CI_COMMIT_REF_SLUG
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH !~ /^(main|master|develop)$/
      when: manual
  allow_failure: true

# ===========================================
# Deploy Base Template
# ===========================================
.deploy-base:
  stage: deploy
  image: alpine:3.21
  before_script:
    - |
      apk add --no-cache openssh-client gettext
      eval $(ssh-agent -s)
      cat "$SSH_PRIVATE_KEY" | tr -d '\r' > /tmp/ssh_key
      echo "" >> /tmp/ssh_key
      chmod 600 /tmp/ssh_key
      ssh-add /tmp/ssh_key
      rm -f /tmp/ssh_key
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      ssh-keyscan -p "${SSH_PORT:-22}" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - echo "Deploying to ${DEPLOY_PATH}..."

    # Generate .env from template
    - envsubst < .env.template > /tmp/.env
    - echo "Generated .env:"
    - cat /tmp/.env

    # Generate docker-compose with substituted variables
    - envsubst < docker-compose.yml > /tmp/docker-compose.yml
    - echo "Generated docker-compose.yml:"
    - cat /tmp/docker-compose.yml

    # Upload files
    - ssh -p "${SSH_PORT:-22}" ${SSH_USER}@${SSH_HOST} "mkdir -p ${DEPLOY_PATH}"
    - scp -P "${SSH_PORT:-22}" /tmp/.env ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/.env
    - scp -P "${SSH_PORT:-22}" /tmp/docker-compose.yml ${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/docker-compose.yml

    # Deploy
    - |
      ssh -p "${SSH_PORT:-22}" ${SSH_USER}@${SSH_HOST} << ENDSSH
        set -e
        cd ${DEPLOY_PATH}

        echo "Logging into registry..."
        echo "${DOCKER_REGISTRY_PASSWORD}" | docker login -u "${DOCKER_REGISTRY_USER}" --password-stdin "${DOCKER_REGISTRY}"

        echo "Pulling new image..."
        docker compose pull web

        echo "Restarting services..."
        docker compose up -d --force-recreate

        echo "Waiting for web to be healthy..."
        HEALTHY=false
        for i in \$(seq 1 12); do
          if docker compose ps web --format '{{.Health}}' 2>/dev/null | grep -q "healthy"; then
            echo "Web is healthy!"
            HEALTHY=true
            break
          fi
          echo "Waiting... (attempt \$i/12)"
          sleep 5
        done

        if [ "\$HEALTHY" = "false" ]; then
          echo "Health check timeout - checking container status..."
          docker compose ps
          docker compose logs --tail=20 web
        fi

        docker compose ps
        echo "Deployment complete!"
      ENDSSH

# ===========================================
# Deploy Staging (develop branch - Auto)
# ===========================================
deploy:staging:
  extends: .deploy-base
  variables:
    DEPLOY_PATH: /srv/panel-staging
    IMAGE_TAG: staging
    APP_ENV: staging
    COMPOSE_PROJECT_NAME: trend-panel-staging
    APP_DOMAIN: panel-stage.trendagency.ir
    PORT: "3000"
    NODE_VERSION: "22-alpine"
    NEXT_PUBLIC_APP_ENV: staging
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
  needs:
    - job: build:staging
  environment:
    name: staging
    url: https://panel-stage.trendagency.ir

# ===========================================
# Deploy Develop (feature branches - Auto after build)
# ===========================================
deploy:feature:
  extends: .deploy-base
  variables:
    DEPLOY_PATH: /srv/panel-develop
    IMAGE_TAG: $CI_COMMIT_REF_SLUG
    APP_ENV: development
    COMPOSE_PROJECT_NAME: trend-panel-dev
    APP_DOMAIN: panel-develop.trendagency.ir
    PORT: "3000"
    NODE_VERSION: "22-alpine"
    NEXT_PUBLIC_APP_ENV: development
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH !~ /^(main|master|develop)$/
  allow_failure: true
  needs:
    - job: build:feature
  environment:
    name: feature/$CI_COMMIT_REF_SLUG
    url: https://panel-develop.trendagency.ir
