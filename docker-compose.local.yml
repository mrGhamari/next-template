# ===========================================
# Docker Compose - Local Development
# Usage: docker compose -f docker-compose.local.yml up -d
# ===========================================

services:
  web:
    container_name: ${COMPOSE_PROJECT_NAME:-next-template}-dev
    build:
      context: .
      dockerfile: .docker/dev.Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-22-alpine}
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_APP_ENV: local
      APP_ENV: local
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  node_modules:
    name: ${COMPOSE_PROJECT_NAME:-next-template}_node_modules
  next_cache:
    name: ${COMPOSE_PROJECT_NAME:-next-template}_next_cache
